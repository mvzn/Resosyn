name: Build

on:
  push:
    branches: [main, cmake-migration]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            mesa-common-dev \
            ninja-build

      - name: Set up Ninja (macOS / Windows)
        if: runner.os != 'Linux'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ runner.os }}-8.0.6

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Resosyn-${{ runner.os }}-VST3
          path: build/Resosyn_artefacts/${{ matrix.build_type }}/VST3/
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Resosyn-${{ runner.os }}-Standalone
          path: build/Resosyn_artefacts/${{ matrix.build_type }}/Standalone/
          if-no-files-found: error

      - name: Upload AU (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Resosyn-macOS-AU
          path: build/Resosyn_artefacts/${{ matrix.build_type }}/AU/
          if-no-files-found: error
